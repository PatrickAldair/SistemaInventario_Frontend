<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5 mt-5">
      <div class="card shadow-lg border-0 rounded-lg">
        <div class="card-header bg-dark text-white text-center py-4">
          <h3 class="font-weight-light my-2">Acceso a Inkatec</h3>
        </div>
        <div class="card-body p-4">
          
          @if(mensajeError) {
            <div class="alert alert-danger">{{ mensajeError }}</div>
          }

          <form (ngSubmit)="iniciarSesion()">
            <div class="form-floating mb-3">
              <input type="text" class="form-control" name="username" [(ngModel)]="credenciales.username" placeholder="Usuario" required />
              <label>Nombre de Usuario</label>
            </div>
            
            <div class="form-floating mb-4">
              <input type="password" class="form-control" name="password" [(ngModel)]="credenciales.password" placeholder="Contraseña" required />
              <label>Contraseña</label>
            </div>
            
            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary btn-lg">Iniciar Sesión</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
