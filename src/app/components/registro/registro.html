<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-dark text-white p-3">
          <h4 class="mb-0 fw-bold">Registrar Nuevo Trabajador</h4>
        </div>
        <div class="card-body p-4">

          @if (mensajeExito) {
            <div class="alert alert-success">{{ mensajeExito }}</div>
          }
          @if (mensajeError) {
            <div class="alert alert-danger">{{ mensajeError }}</div>
          }

          <form (ngSubmit)="registrar()">
            <div class="mb-3">
              <label class="form-label fw-bold">Nombre de Usuario (DNI o Código)</label>
              <input type="text" class="form-control" name="username" [(ngModel)]="nuevoUsuario.username" required placeholder="Ejemplo: juan.perez">
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Contraseña Inicial</label>
              <input type="password" class="form-control" name="password" [(ngModel)]="nuevoUsuario.password" required placeholder="Asigne una clave segura">
            </div>

            <div class="d-flex justify-content-between align-items-center">
              <a routerLink="/home" class="btn btn-outline-secondary">Volver al Inicio</a>
              <button type="submit" class="btn btn-success px-4">Registrar</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
